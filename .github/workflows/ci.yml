name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Test and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Gradle compatibility properties
        shell: bash
        run: |
          echo "TARGET_JAVA_VERSION=$(grep '^targetJavaVersion=' gradle.properties | cut -d= -f2)" >> "$GITHUB_ENV"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.TARGET_JAVA_VERSION }}
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew --no-daemon test -PtestRunId=ci

      - name: Build plugin jar
        run: ./gradlew --no-daemon shadowJar

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: mineroyale-plugin
          path: build/libs/*.jar
          if-no-files-found: error
