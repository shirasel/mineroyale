# =========================
# Mineroyale Config
# =========================

game:
  min-players: 2
  max-players: 20
  countdown-seconds: 30
  initial-pvp-grace-seconds: 45
  show-player-locator-bar: true
  player-locator-max-alive-players: 4
  give-initial-compass: true
  give-end-crystal: true
  end-crystal-glow-seconds: 15
  end-crystal-item-name: "発光の岩"
  end-crystal-item-description: "使用すると%seconds%秒間自分以外の生存者1名をランダムで発光させます。"
  hide-name-tags: true
  disable-advancement-announcements: true
  restrict-block-modification-outside-border: true

world:
  name: world

  # ランダムに選ぶボーダー中心の最大距離
  random-center-range: 3000

  # 初期ボーダーサイズ
  initial-border-size: 1000

spawn:
  # プレイヤー同士の最小スポーン距離
  min-distance: 50

border:
  warning-distance: 10
  warning-time: 5

  phases:
    - wait: 300
      duration: 180
      size: 600

    - wait: 300
      duration: 160
      size: 400

    - wait: 240
      duration: 120
      size: 200

    - wait: 200
      duration: 90
      size: 100

    - wait: 200
      duration: 60
      size: 50

  final-phase:
    enable-smooth-move: true
    move-range: 40
    move-duration-seconds: 20

  enhanced-damage:
    enabled: true
    base-damage: 1.0
    increase-per-second: 0.5
    max-damage: 10.0
